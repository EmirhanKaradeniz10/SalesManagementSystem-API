"13" lengthAdjust="spacing" textLength="60.7788" x="1592.4463" y="322.3169">Example:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="177.4995" x="1592.4463" y="337.4497">Request: GET /api/Products</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="1592.4463" y="352.5825">&#160;</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="160.6401" x="1592.4463" y="367.7153">It does not currently log:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="151.4043" x="1592.4463" y="382.8481">- Response status code</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="131.8535" x="1592.4463" y="397.981">- Execution duration</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="98.4966" x="1592.4463" y="413.1138">- Request body</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="108.126" x="1592.4463" y="428.2466">- Response body</text><rect fill="#F8FAFC" height="33.9688" rx="5" ry="5" style="stroke:#334155;stroke-width:0.5;" width="186.2246" x="1380.2217" y="331.0977"/><text fill="#0F172A" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="166.2246" x="1390.2217" y="352.2363">RequestLoggingMiddleware</text><rect fill="#F8FAFC" height="33.9688" rx="5" ry="5" style="stroke:#334155;stroke-width:0.5;" width="284.9551" x="1330.8564" y="456.3125"/><text fill="#0F172A" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="264.9551" x="1340.8564" y="477.4512">GlobalExceptionMiddleware enters try block</text><rect fill="#F8FAFC" height="33.9688" rx="5" ry="5" style="stroke:#334155;stroke-width:0.5;" width="134.6387" x="1406.0146" y="510.2813"/><text fill="#0F172A" font-family="sans-serif"