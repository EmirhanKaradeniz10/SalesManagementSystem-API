t><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="22.6499" x="1558.2278" y="4321.5308">FILE</text><path d="M1373.4924,4346.125 L1373.4924,4384.957 L1353.4924,4388.957 L1373.4924,4392.957 L1373.4924,4431.7891 A0,0 0 0 0 1373.4924,4431.7891 L1575.6863,4431.7891 A0,0 0 0 0 1575.6863,4431.7891 L1575.6863,4356.125 L1565.6863,4346.125 L1373.4924,4346.125 A0,0 0 0 0 1373.4924,4346.125" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M1565.6863,4346.125 L1565.6863,4356.125 L1575.6863,4356.125 L1565.6863,4346.125" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="169.0508" x="1379.4924" y="4363.1919">Typical success response:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="1379.4924" y="4378.3247">&#160;</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="96.6875" x="1379.4924" y="4393.4575">success = true</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="181.1938" x="1379.4924" y="4408.5903">message = operation result</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="141.3306" x="1379.4924" y="4423.7231">data = result payload</text><rect fill="#F8FAFC" height="33.9688" rx="5" ry="5" style="stroke:#334155;stroke-width:0.5;" width="182.0762" x="1171.4163" y="4371.9727"/><text fill="#0F172A" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="162.0762" x="1181.4163" y="4393.1113">Create ApiResponse object</text><rect fill="#F8FAFC" height="33.9688" rx="5" ry="5" style="stroke:#334155;stroke-width:0.5;" width="143.1523" x="1190.8782" y="4451.7891"/><text fill="#0F172A" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="123.1523" x="1200.8782" y="4472.9277">Return HTTP 200 OK</text><rect fill="#F8FAFC" height="33.9688" rx="5" ry="5" style="stroke:#334155;stroke-width:0.5;" width="177.0547" x="1595.6863" y="4346.125"/><text fill="#0F172A" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="157.0547" x="1605.6863" y="4367.2637">Return Excel file response</text><polygon fill="#E2E8F0" points="1473.334,4491.7578,1485.334,4503.7578,1473.334,4515.7578,1461.334,4503.7578,1473.334,4491.7578" style="stroke:#475569;stroke-width:0.5;"/><path d="M1504.334,4537.7578 L1504.334,4850.4141 L1842.0757,4850.4141 L1842.0757,4547.7578 L1832.0757,4537.7578 L1504.334,4537.7578" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M1832.0757,4537.7578 L1832.0757,4547.7578 L1842.0757,4547.7578 L1832.0757,4537.7578" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="161.0781" x="1510.334" y="4554.8247">Global exception path</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="1510.334" y="4569.9575">&#160;</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="236.6152" x="1510.334" y="4585.0903">Any exception thrown after entering</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="316.7417" x="1510.334" y="4600.2231">GlobalExceptionMiddleware is handled centrally.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="1510.334" y="4615.356">&#160;</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="93.9834" x="1510.334" y="4630.4888">AppException:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="95.4624" x="1510.334" y="4645.6216">- Logs warning</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="186.8433" x="1510.334" y="4660.7544">- Uses exception.StatusCode</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="167.3877" x="1510.334" y="4675.8872">- Returns structured JSON</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="1510.334" y="4691.02">&#160;</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="150.9092" x="1510.334" y="4706.1528">Unexpected Exception:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="75.1626" x="1510.334" y="4721.2856">- Logs error</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="226.0527" x="1510.334" y="4736.4185">- Returns 500 Internal Server Error</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="215.0396" x="1510.334" y="4751.5513">- Hides internal exception details</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="1510.334" y="4766.6841">&#160;</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="115.1338" x="1510.334" y="4781.8169">Response format:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="1510.334" y="4796.9497">&#160;</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="100.9341" x="1510.334" y="4812.0825">success = false</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="172.123" x="1510.334" y="4827.2153">message = error message</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="81.6182" x="1510.334" y="48