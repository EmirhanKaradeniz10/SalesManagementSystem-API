-width:0.5;" width="193.2549" x="394.5" y="574.5938"/><rect fill="#E2E8F0" height="4" style="stroke:#E2E8F0;stroke-width:0.5;" width="193.2549" x="394.5" y="596.8906"/><rect fill="none" height="107.4844" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="193.2549" x="394.5" y="574.5938"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="88.5664" x="446.8442" y="592.5889">OrderDetails</text><line style="stroke:#334155;stroke-width:0.5;" x1="395.5" x2="586.7549" y1="600.8906" y2="600.8906"/><g data-visibility-modifier="IE_MANDATORY"><ellipse cx="405.5" cy="614.5391" fill="#000000" rx="3" ry="3" style="stroke:#000000;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="21.1094" x="414.5" y="617.8857">PK</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="130.4775" x="440.0596" y="617.8857">Id : int &#171;IDENTITY&#187;</text><line style="stroke:#334155;stroke-width:1;" x1="395.5" x2="586.7549" y1="625.1875" y2="625.1875"/><g data-visibility-modifier="IE_MANDATORY"><ellipse cx="405.5" cy="638.8359" fill="#000000" rx="3" ry="3" style="stroke:#000000;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="153.5762" x="414.5" y="642.1826">OrderId : int &#171;FK, NN&#187;</text><g data-visibility-modifier="IE_MANDATORY"><ellipse cx="405.5" cy="655.1328" fill="#000000" rx="3" ry="3" style="stroke:#000000;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="167.2549" x="414.5" y="658.4795">ProductId : int &#171;FK, NN&#187;</text><g data-visibility-modifier="IE_MANDATORY"><ellipse cx="405.5" cy="671.4297" fill="#000000" rx="3" ry="3" style="stroke:#000000;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="134.8936" x="414.5" y="674.7764">Quantity : int &#171;NN&#187;</text></g><g class="entity" data-qualified-name="GMN18" data-source-line="164" id="ent0019"><path d="M1394.5,322.5938 L1394.5,387.5938 L1359.98,391.5938 L1394.5,395.5938 L1394.5,460.7891 A4,4 0 0 0 1398.5,464.7891 L1653.3013,464.7891 A4,4 0 0 0 1657.3013,460.7891 L1657.3013,328.5938 L1647.3013,318.5938 L1398.5,318.5938 A4,4 0 0 0 1394.5,322.5938" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M1647.3013,318.5938 L1647.3013,326.5938 A2,2 0 0 0 1649.3013,328.5938 L1657.3013,328.5938 L1647.3013,318.5938" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="241.8013" x="1400.5" y="335.6606">Authentication data is stored directly</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="145.6787" x="1400.5" y="350.7935">inside the Users table.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="1400.5" y="365.9263">&#160;</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="149.1953" x="1400.5" y="381.0591">There are no separate:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="81.25" x="1400.5" y="396.1919">- Roles table</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="142.2764" x="1400.5" y="411.3247">- RefreshTokens table</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="1400.5" y="426.4575">&#160;</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="217.2295" x="1400.5" y="441.5903">Role values are stored as strings.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="231.0229" x="1400.5" y="456.7231">Refresh tokens are stored per user.</text></g><g class="entity" data-qualified-name="GMN21" data-source-line="176" id="ent0022"><path d="M2016.5,337.5938 L2016.5,445.5234 A4,4 0 0 0 2020.5,449.5234 L2289.5835,449.5234 A4,4 0 0 0 2293.5835,445.5234 L2293.5835,343.5938 L2283.5835,333.5938 L2020.5,333.5938 A4,4 0 0 0 2016.5,337.5938" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M2283.5835,333.5938 L2283.5835,341.5938 A2,2 0 0 0 2285.5835,343.5938 L2293.5835,343.5938 L2283.5835,333.5938" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="235.5742" x="2022.5" y="350.6606">LoginAudits does not currently have</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="135.4082" x="2022.5" y="365.7935">a UserId foreign key.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="2022.5" y="380.9263">&#160;</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="213.3892" x="2022.5" y="396.0591">The Username value is stored as</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="232.3623" x="2022.5" y="411.1919">historical audit data, allowing failed</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="256.0835" x="2022.5" y="426.3247">login attempts for unknown usernames</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="99.9883" x="2022.5" y="441.4575">to be recorded.</text></g><g class="entity" data-qualified-name="GMN24" data-source-line="186" id="ent0025"><path d="M2328.5,322.5938 L2328.5,460.7891 A4,4 0 0 0 2332.5,464.7891 L2577.7671,464.7891 A4,4 0 0 0 2581.7671,460.7891 L2581.7671,328.5938 L2571.7671,318.5938 L2332.5,318.5938 A4,4 0 0 0 2328.5,322.5938" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M2571.7671,318.5938 L2571.7671,326.5938 A2,2 0 0 0 2573.7671,328.5938 L2581.7671,328.5938 L2571.7671,318.5938" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="117.6411" x="2334.5" y="335.6606">EF Core precision:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="141.4385" x="2334.5" y="350.7935">Price = decimal(18,2)</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="2334.5" y="365.9263">&#160;</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="114.4419" x="2334.5" y="381.0591">Database trigger:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="93.5454" x="2334.5" y="396.1919">TR_StockAudit</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="2334.5" y="411.3247">&#160;</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="227.8428" x="2334.5" y="426.4575">The trigger is registered in EF Core</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="232.2671" x="2334.5" y="441.5903">to avoid SQL Server OUTPUT clause</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="215.4902" x="2334.5" y="456.7231">conflicts during product updates.</text></g><g class="entity" data-qualified-name="GMN27" data-source-line="198" id="ent0028"><path d="M654.5,566.5938 L654.5,689.6563 A4,4 0 0 0 658.5,693.6563 L909.3467,693.6563 A4,4 0 0 0 913.3467,689.6563 L913.3467,572.5938 L903.3467,562.5938 L658.5,562.5938 A4,4 0 0 0 654.5,566.5938" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M903.3467,562.5938 L903.3467,570.5938 A2,2 0 0 0 905.3467,572.5938 L913.3467,572.5938 L903.3467,562.5938" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="170.6631" x="660.5" y="579.6606">OrderStatus enum values:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="660.5" y="594.7935">&#160;</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="79.8599" x="660.5" y="609.9263">1 = Pending</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="98.3315" x="660.5" y="625.0591">2 = Completed</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="91.3301" x="660.5" y="640.1919">3 = Cancelled</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="660.5" y="655.3247">&#160;</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="237.8467" x="660.5" y="670.4575">IsCancelled is also stored separately</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="139.0645" x="660.5" y="685.5903">as a boolean column.</text></g><g class="entity" data-qualified-name="GMN30" data-source-line="209" id="ent0031"><path d="M346.5,757.5938 L346.5,880.6563 A4,4 0 0 0 350.5,884.6563 L631.187,884.6563 A4,4 0 0 0 635.187,880.6563 L635.187,763.5938 L625.187,753.5938 L495,753.5938 L491,681.8038 L487,753.5938 L350.5,753.5938 A4,4 0 0 0 346.5,757.5938" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M625.187,753.5938 L625.187,761.5938 A2,2 0 0 0 627.187,763.5938 L635.187,763.5938 L625.187,753.5938" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="261.4727" x="352.5" y="770.6606">OrderDetails stores the ordered product</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="86.9185" x="352.5" y="785.7935">and quantity.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="352.5" y="800.9263">&#160;</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="246.2319" x="352.5" y="816.0591">UnitPrice or historical sale price is not</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="207.9746" x="352.5" y="831.1919">currently persisted in this table.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="267.687" x="352.5" y="846.3247">Therefore, later changes to Product.Price</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="248.6631" x="352.5" y="861.4575">may affect historical total calculations</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="244.9941" x="352.5" y="876.5903">unless totals are captured elsewhere.</text></g><g class="entity" data-qualified-name="GMN33" data-source-line="220" id="ent0034"><path d="M1692.5,352.5938 L1692.5,430.2578 A4,4 0 0 0 1696.5,434.2578 L1977.936,434.2578 A4,4 0 0 0 1981.936,430.2578 L1981.936,358.5938 L1971.936,348.5938 L1696.5,348.5938 A4,4 0 0 0 1692.5,352.5938" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M1971.936,348.5938 L1971.936,356.5938 A2,2 0 0 0 1973.936,358.5938 L1981.936,358.5938 L1971.936,348.5938" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="267.7441" x="1698.5" y="365.6606">Deleting a Customer cascades to Orders.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="1698.5" y="380.7935">&#160;</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="268.1885" x="1698.5" y="395.9263">Because Orders cascade to OrderDetails,</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="268.436" x="1698.5" y="411.0591">deleting a Customer may also remove all</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="183.5996" x="1698.5" y="426.1919">related order-detail records.</text></g><g class="entity" data-qualified-name="GMN36" data-source-line="228" id="ent0037"><path d="M36,589.0938 L36,666.7578 A4,4 0 0 0 40,670.7578 L307.96,670.7578 A4,4 0 0 0 311.96,666.7578 L311.96,595.0938 L301.96,585.0938 L121.25,585.0938 L117.25,453.7338 L113.25,585.0938 L40,585.0938 A4,4 0 0 0 36,589.0938" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M301.96,585.0938 L301.96,593.0938 A2,2 0 0 0 303.96,595.0938 L311.96,595.0938 L301.96,585.0938" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="227.3223" x="42" y="602.1606">Product deletion is restricted when</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="238.1006" x="42" y="617.2935">OrderDetails reference that product.</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="42" y="632.4263">&#160;</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="254.96" x="42" y="647.5591">This protects historical order data from</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="192.0547" x="42" y="662.6919">being orphaned or corrupted.</text></g><g class="entity" data-qualified-name="IndexNote" data-source-line="240" id="ent0039"><path d="M346,63.5938 L346,216.9219 A4,4 0 0 0 350,220.9219 L621.9653,220.9219 A4,4 0 0 0 625.9653,216.9219 L625.9653,69.5938 L615.9653,59.5938 L350,59.5938 A4,4 0 0 0 346,63.5938" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M615.9653,59.5938 L615.9653,67.5938 A2,2 0 0 0 617.9653,69.5938 L625.9653,69.5938 L615.9653,59.5938" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:1;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="220.2129" x="352" y="76.6606">Indexes generated by EF Core</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="352" y="91.7935">&#160;</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="132.1328" x="352" y="106.9263">- Orders.CustomerId</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="144.4536" x="352" y="122.0591">- OrderDetails.OrderId</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="157.1553" x="352" y="137.1919">- OrderDetails.ProductId</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="141.0703" x="352" y="152.3247">- Products.CategoryId</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="124.5918" x="352" y="167.4575">- Users.CustomerId</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="352" y="182.5903">&#160;</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="258.9653" x="352" y="197.7231">Primary keys are indexed automatically</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="96.7002" x="352" y="212.856">by SQL Server.</text></g><