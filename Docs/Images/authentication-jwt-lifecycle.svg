 lengthAdjust="spacing" textLength="4.1323" x="785.4438" y="7222.5552">&#160;</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="117.603" x="785.4438" y="7237.688">LoginAudits table:</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="75.3213" x="785.4438" y="7252.8208">- Username</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="75.9878" x="785.4438" y="7267.9536">- IP address</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="81.6245" x="785.4438" y="7283.0864">- User-Agent</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="71.7603" x="785.4438" y="7298.2192">- IsSuccess</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="101.0356" x="785.4438" y="7313.3521">- FailureReason</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="76.3369" x="785.4438" y="7328.4849">- LoginTime</text><rect fill="#F8FAFC" height="33.9688" rx="5" ry="5" style="stroke:#334155;stroke-width:0.5;" width="228.6758" x="530.7681" y="7170.8047"/><text fill="#0F172A" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="208.6758" x="540.7681" y="7191.9434">Authentication lifecycle completed</text><path d="M767.6606,7346.5508 L767.6606,7423.2148 L747.6606,7427.2148 L767.6606,7431.2148 L767.6606,7507.8789 A0,0 0 0 0 767.6606,7507.8789 L1029.2241,7507.8789 A0,0 0 0 0 1029.2241,7507.8789 L1029.2241,7356.5508 L1019.2241,7346.5508 L767.6606,7346.5508 A0,0 0 0 0 767.6606,7346.5508" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M1019.2241,7346.5508 L1019.2241,7356.5508 L1029.2241,7356.5508 L1019.2241,7346.5508" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="152.7817" x="773.6606" y="7363.6177">Security characteristics</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="773.6606" y="7378.7505">&#160;</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="208.2412" x="773.6606" y="7393.8833">- Password hashing uses BCrypt</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="171.0186" x="773.6606" y="7409.0161">- JWT uses HMAC SHA-256</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="214.2461" x="773.6606" y="7424.1489">- Refresh tokens use secure RNG</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="220.8286" x="773.6606" y="7439.2817">- Refresh tokens rotate on refresh</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="206.4956" x="773.6606" y="7454.4146">- Lockout occurs after 5 failures</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="210.7676" x="773.6606" y="7469.5474">- Lockout duration is 15 minutes</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="186.1895" x="773.6606" y="7484.6802">- Login attempts are audited</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="240.5635" x="773.6606" y="7499.813">- Email domains are checked by DNS</text><rect fill="#F8FAFC" height="33.9688" rx="5" ry="5" style="stroke:#334155;stroke-width:0.5;" width="205.1094" x="542.5513" y="7410.2305"/><text fill="#0F172A" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="185.1094" x="552.5513" y="7431.3691">Apply current security controls</text><path d="M790.9312,7517.8789 L790.9312,7594.543 L770.9312,7598.543 L790.9312,7602.543 L790.9312,7679.207 A0,0 0 0 0 790.9312,7679.207 L1087.3433,7679.207 A0,0 0 0 0 1087.3433,7679.207 L1087.3433,7527.8789 L1077.3433,7517.8789 L790.9312,7517.8789 A0,0 0 0 0 790.9312,7517.8789" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M1077.3433,7517.8789 L1077.3433,7527.8789 L1087.3433,7527.8789 L1077.3433,7517.8789" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="233.2383" x="796.9312" y="7534.9458">Current implementation boundaries</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="796.9312" y="7550.0786">&#160;</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="133.5166" x="796.9312" y="7565.2114">- No logout endpoint</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="202.3633" x="796.9312" y="7580.3442">- No token revocation endpoint</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="184.8628" x="796.9312" y="7595.4771">- One refresh token per user</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="201.8047" x="796.9312" y="7610.6099">- Refresh token stored in Users</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="229.9883" x="796.9312" y="7625.7427">- Refresh token stored as plain text</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="191.6357" x="796.9312" y="7640.8755">- LoginAudit has no UserId FK</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="275.4121" x="796.9312" y="7656.0083">- Customer and User are saved separately</text><text fill="#7C2D12" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="254.2236" x="796.9312" y="7671.1411">- Email failure does not fail registration</text><rect fill="#F8FAFC" height="33.9688" rx="5" ry="5" style="stroke:#334155;stroke-width:0.5;" width="251.6504" x="519.2808" y="7581.5586"/><text fill="#0F172A" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="231.6504" x="529.2808" y="7602.6973">Recognize implementation boundaries</text><ellipse cx="645.106" cy="7722.207" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="645.106" cy="7722.207" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#475569;stroke-width:1;" x1="377.6313" x2="377.6313" y1="207.8594" y2="240.6641"/><polygon fill="#475569" points="373.6313,230.6641,377.6313,240.6641,381.6313,230.6641,377.6313,234.6641" style="stroke:#475569;stroke-width:1;"/><line style="stroke:#475569;stroke-width:1;" x1="377.6313" x2="377.6313" y1="274.6328" y2="298.2148"/><polygon fill="#475569" points="373.6313,288.2148,377.6313,298.2148,381.6313,288.2148,377.6313,292.2148" style="stroke:#475569;stroke-width:1;"/><line style="stroke:#475569;stroke-width:1;" x1="552.6975" x2="552.6975" y1="207.8594" y2="227.8594"/><polygon fill="#475569" points="548.6975,217.8594,552.6975,227.8594,556.6975,217.8594,552.6975,221.8594" style="stroke:#475569;stroke-width:1;"/><line style="stroke:#475569;stroke-width:1;" x1="552.6975" x2="552.6975" y1="261.8281" y2="298.2148"/><polygon fill="#475569" points="548.6975,288.2148,552.6975,298.2148,556.6975,288.2148,552.6975,292.2148" style="stroke:#475569;stroke-width:1;"/><line style="stroke:#475569;stroke-width:1;" x1="722.6731" x2="722.6731" y1="207.8594" y2="227.8594"/><polygon fill="#475569" points="718.6731,217.8594,722.6731,227.8594,726.6731,217.8594,722.6731,221.8594" style="stroke:#475569;stroke-width:1;"/><line style="stroke:#475569;stroke-width:1;" x1="722.6731" x2="722.6731" y1="261.8281" y2="298.2148"/><polygon fill="#475569" points="